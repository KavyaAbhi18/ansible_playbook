---
 - name: Installing Apache web server
   hosts: all
   become: yes

   tasks:
    - name: Install Apache in linux servers
      yum:
        name: httpd
        state: present
      when: ansible_os_family == "RedHat"
    
    - name: Install Apache on Ubuntu servers
      apt:
        name: apache2
        state: present
      when: ansible_os_family == "Debian"

    - name:  Start Apache on Amazon linux
      service:
        name: httpd
        state: started
        enabled: yes
      when: ansible_os_family == "RedHat"

    - name:  Start Apache on Ubuntu servers
      service:
        name: apache2
        state: started
        enabled: yes
      when: ansible_os_family == "Debian"

    - name: Gather service facts
      service_facts:
    
   # - name: Print all service
   #   debug:
     #   var: ansible_facts.services

    - name: Check Apache service status on Linux
      debug:
        msg: "Apache is running on Redhat"
      when: 
       - ansible_os_family == "RedHat"
       - "'httpd' in ansible_facts.services"
       - ansible_facts.services['httpd'].state == "running" 

    - name: Check Apache service status on Ubuntu
      debug:
        msg: "Apache is running on Debian"
      when: 
       - ansible_os_family == "Debian"
       - "'apache2' in ansible_facts.services"
       - ansible_facts.services['apache2'].state == "running" 


    - name: Copy index.html file to default path on Linux 
      copy:
        src: /root/index.html
        dest: /var/www/html/index.html
        mode: 0777