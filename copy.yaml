---

 - name: Create test directory
   file:
     path: /root/test
     state: directory
     
 - name: Copying index.html to servers
   hosts: all
   become: yes 
   tasks:
    - name: copy index.html to servers
      copy:
        src: /root/index.html
        dest: /root/test/index.html
        mode: 0777
